    type: object
  github_com_cogniia_core-api-template_src_database_model.DateOrderEnum:
    enum:
    - asc
    - desc
    type: string
    x-enum-varnames:
    - Asc
    - Desc
  github_com_cogniia_core-api-template_src_user_entity.User:
