info:
  contact: {}
  description: Template to use in your challenge
  title: Core API template
  version: "1.0"
paths:
  /product:
    delete:
      consumes:
      - application/json
      description: Deletes a product by its ID (only accessible by admins)
      parameters:
      - description: Product ID to delete
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cogniia_core-api-template_src_common_model.RequiredId'
      produces:
      - application/json
      responses:
        "204":
          description: Product deleted successfully
      security:
      - ApiKeyAuth: []
      summary: Delete product by ID
      tags:
      - Product
    get:
      consumes:
      - application/json
      description: Returns a paginated list of products
      parameters:
      - default: desc
        enum:
        - asc
        - desc
        in: query
        name: created_at
        type: string
        x-enum-varnames:
        - Asc
        - Desc
      - in: query
        name: created_at_geq
        type: string
      - in: query
        name: created_at_leq
        type: string
      - description: The unique identifier
        in: query
        name: id
        type: string
      - in: query
        name: ingredients
        type: string
      - default: 10
        description: Number of items to return
        in: query
        name: limit
        type: integer
      - in: query
        name: name
        type: string
      - default: 0
        description: The offset from where to start the items
        in: query
        name: offset
        type: integer
      - in: query
        name: price
        type: number
      - default: desc
        enum:
        - asc
        - desc
        in: query
        name: updated_at
        type: string
        x-enum-varnames:
        - Asc
        - Desc
      - in: query
        name: updated_at_geq
        type: string
      - in: query
        name: updated_at_leq
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of products
          schema:
            items:
              $ref: '#/definitions/product_entity.Product'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get products paginated
      tags:
      - Product
    post:
      consumes:
      - application/json
      description: Creates a new product item
      parameters:
      - description: Product data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/product_model.Create'
      produces:
      - application/json
      responses:
        "201":
          description: Created product
          schema:
            $ref: '#/definitions/product_entity.Product'
      summary: Creates a new product
      tags:
      - Product
    put:
      consumes:
      - application/json
      description: Updates a product's details by its ID
      parameters:
      - description: Product data to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/product_model.UpdateWithId'
      produces:
      - application/json
      responses:
        "200":
          description: Product updated successfully
          schema:
            $ref: '#/definitions/product_entity.Product'
      security:
      - ApiKeyAuth: []
      summary: Update product by ID
      tags:
      - Product
  /user:
    delete:
      consumes:
      - application/json
      description: Deletes a user by their ID (only accessible by admins). You cannot
        delete su@user
      parameters:
      - description: User ID to delete
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cogniia_core-api-template_src_common_model.RequiredId'
      produces:
      - application/json
      responses:
        "204":
          description: User deleted successfully
      security:
      - ApiKeyAuth: []
      summary: Delete user by ID
      tags:
      - User
    get:
      consumes:
      - application/json
      description: Returns a paginated list of users
      parameters:
      - default: desc
        enum:
        - asc
        - desc
        in: query
        name: created_at
        type: string
        x-enum-varnames:
        - Asc
        - Desc
      - in: query
        name: created_at_geq
        type: string
      - in: query
        name: created_at_leq
        type: string
      - in: query
        name: email
        type: string
      - description: The unique identifier
        in: query
        name: id
        type: string
      - default: 10
        description: Number of items to return
        in: query
        name: limit
        type: integer
      - in: query
        name: name
        type: string
      - default: 0
        description: The offset from where to start the items
        in: query
        name: offset
        type: integer
      - in: query
        name: role
        type: string
      - default: desc
        enum:
        - asc
        - desc
        in: query
        name: updated_at
        type: string
        x-enum-varnames:
        - Asc
        - Desc
      - in: query
        name: updated_at_geq
        type: string
      - in: query
        name: updated_at_leq
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of users
          schema:
            items:
              $ref: '#/definitions/github_com_cogniia_core-api-template_src_user_entity.User'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get users paginated
      tags:
      - User
    post:
      consumes:
      - application/json
      description: Creates a new user account
      parameters:
      - description: User data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/github_com_cogniia_core-api-template_src_user_model.Create'
      produces:
      - application/json
      responses:
        "201":
          description: Created user
          schema:
            $ref: '#/definitions/github_com_cogniia_core-api-template_src_user_entity.User'
      summary: Creates a new user
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Updates a user's details by their ID (accessible by superuser)
      parameters:
      - description: User data to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cogniia_core-api-template_src_user_model.UpdateWithId'
      produces:
      - application/json
      responses:
        "200":
          description: User updated successfully
          schema:
            $ref: '#/definitions/github_com_cogniia_core-api-template_src_common_model.ApiError'
      security:
      - ApiKeyAuth: []
      summary: Update user by ID
      tags:
      - User
  /user/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Refreshes the access token using a refresh token.
      parameters:
      - description: Refresh token data
        in: body
        name: refresh
        required: true
        schema:
          $ref: '#/definitions/github_com_cogniia_core-api-template_src_auth_model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Refresh successful
          schema:
            $ref: '#/definitions/github_com_cogniia_core-api-template_src_auth_model.LoginResponse'
      summary: Refresh Access Token
      tags:
      - Auth
  /user/auth/token:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens.
      parameters:
      - description: Login data
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/github_com_cogniia_core-api-template_src_auth_model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/github_com_cogniia_core-api-template_src_auth_model.LoginResponse'
      summary: Login
      tags:
      - Auth
  /user/me:
    delete:
      description: Deletes the user who made the request
      responses:
        "204":
          description: User deleted successfully
      security:
      - ApiKeyAuth: []
      summary: Delete current user
      tags:
      - User
    get:
      consumes:
      - application/json
      description: Returns the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: Current user
          schema:
            $ref: '#/definitions/github_com_cogniia_core-api-template_src_user_entity.User'
      security:
      - ApiKeyAuth: []
      summary: Gets current user
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Updates the details of the user who made the request
      parameters:
      - description: User data to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cogniia_core-api-template_src_user_model.UpdateWithPassword'
      produces:
      - application/json
      responses:
        "200":
          description: User updated successfully
          schema:
            $ref: '#/definitions/fiber.Map'
      security:
      - ApiKeyAuth: []
      summary: Update current user
      tags:
      - User
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
