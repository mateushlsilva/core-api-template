definitions:
  fiber.Map:
    additionalProperties: true
    type: object
  github_com_cogniia_core-api-template_src_auth_model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  github_com_cogniia_core-api-template_src_auth_model.LoginResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
    type: object
  github_com_cogniia_core-api-template_src_auth_model.RefreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  github_com_cogniia_core-api-template_src_common_model.ApiError:
    properties:
      content:
        description: Additional information about the error provided by the service
          that generated it. E. g. if an ORM returns an error, it will be propagated
          here as the raw error.
      context:
        description: Information about where the error occurred. E. g. the name of
          the package that returned the error.
        type: string
      description:
        description: Description of the error generated by a.DescriptiveError.Error()
        type: string
      message:
        description: Short text describing the error as best as we can for humans.
        type: string
    type: object
  github_com_cogniia_core-api-template_src_common_model.RequiredId:
    properties:
      id:
        description: The unique identifier.
